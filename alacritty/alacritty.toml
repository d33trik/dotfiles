import = [
	"~/.config/alacritty/themes/catppuccin/mocha.toml"
]

[env]
TERM = "xterm-256color"

[window.padding]
x = 5
y = 10

[font]
size = 12.0

[font.normal]
family = "Dank Mono"
style = "Regular"

[font.bold]
family = "Dank Mono"
style = "Bold"

[font.italic]
family = "Dank Mono"
style = "Italic"
